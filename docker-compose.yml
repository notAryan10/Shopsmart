services:
  db:
    image: mysql:8
    container_name: shopsmart-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: Shopsmart
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    image: shopsmart-backend:latest
    container_name: shopsmart-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/Shopsmart
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./client
    image: shopsmart-frontend:latest
    container_name: shopsmart-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  db_data: